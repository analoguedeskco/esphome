esphome:
  name: idx2
  friendly_name: "IDX-2"
  project:
    name: "analoguedeskco.idx2-esphome"
    version: "1.0.0"
  includes:
    - esphome_extras.h
    - SwitecX25.h
    - SwitecX25.cpp
  on_boot:
    priority: 600
    then:
      - lambda: |-
          gauge = new SwitecX25(945, 0, 1, 6, 7);
          gauge->accelTable = slowAccelTable;
          gauge->maxVel = slowAccelTable[4][0];
          gauge->currentStep = 944;
          gauge->setPosition(0);
          xTaskCreate(gauge_task, "gauge", 2048, nullptr, 5, nullptr);

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

# Native Home Assistant API (push-based, replaces HTTP polling)
api:
  encryption:
    key: !secret api_encryption_key

# OTA updates while running ESPHome
ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Fallback AP if WiFi is unavailable
  ap:
    ssid: "IDX_setup"
    password: ""

captive_portal:

logger:
  level: INFO


# WS2812B LEDs — 6 addressable RGB LEDs on GPIO8, controlled as one light entity
light:
  - platform: neopixelbus
    type: GRB
    variant: WS2812
    pin: GPIO8
    num_leds: 6
    name: "LEDs"
    id: idx2_leds
    default_transition_length: 500ms
    restore_mode: RESTORE_DEFAULT_ON

# Gauge position exposed as a 0–100 number entity in Home Assistant
number:
  - platform: template
    name: "Gauge Position"
    min_value: 0
    max_value: 100
    step: 0.1
    optimistic: true
    restore_value: true
    set_action:
      - lambda: if (gauge) gauge->setPosition((int)(x / 100.0f * 945));

# Button to switch back to IDX-2 custom firmware
button:
  - platform: template
    name: "Firmware Switch"
    icon: mdi:swap-horizontal
    on_press:
      - logger.log: "Switching boot partition to ota_0 (IDX-2 firmware)..."
      - lambda: |-
          const esp_partition_t *p = esp_partition_find_first(
            ESP_PARTITION_TYPE_APP,
            ESP_PARTITION_SUBTYPE_APP_OTA_0,
            nullptr
          );
          if (p != nullptr) {
            esp_ota_set_boot_partition(p);
            delay(200);
            esp_restart();
          }
